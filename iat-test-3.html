
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IAT Test 3 Hard Mock</title>
<style>
body{margin:0;font-family:Arial;background:#eef2ff}
header{background:#142c7d;color:#fff;padding:15px 30px;display:flex;justify-content:space-between}
.container{display:grid;grid-template-columns:3fr 1fr;gap:20px;padding:25px}
.main,.side{background:#fff;padding:25px;border-radius:18px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.option{display:block;padding:12px;margin:12px 0;background:#f1f5ff;border-radius:10px}
.palette{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.qbtn{padding:10px;border:none;background:#dbe4ff;border-radius:8px;cursor:pointer}
.answered{background:#79d879}
.action{padding:12px 20px;margin:8px;border:none;background:#142c7d;color:#fff;border-radius:10px;cursor:pointer}
#result{display:none;font-size:22px;line-height:2}
</style>
</head>
<body>
<header>
<h2>IAT TEST 3 (60 Questions)</h2>
<h2 id="timer">180:00</h2>
</header>

<div class="container">
<div class="main">
<div id="testArea">
<h3 id="subject"></h3>
<h2 id="question"></h2>
<div id="options"></div>
<button class="action" onclick="prevQ()">Previous</button>
<button class="action" onclick="nextQ()">Save & Next</button>
<button class="action" onclick="submitTest()">Submit</button>
</div>
<div id="result"></div>
</div>

<div class="side">
<h3>Question Palette</h3>
<div class="palette" id="palette"></div>
</div>
</div>

<script>
const questions=[

// PHYSICS (15)

{subject:"Physics",q:"Range of projectile maximum at",options:["30°","45°","60°","90°"],answer:1},
{subject:"Physics",q:"Escape velocity of Earth",options:["7.9","11.2","15","20"],answer:1},
{subject:"Physics",q:"Dimensional formula of Planck constant",options:["ML²T⁻¹","MLT⁻²","M²LT","LT"],answer:0},
{subject:"Physics",q:"Work in uniform circular motion",options:["Positive","Negative","Zero","Infinite"],answer:2},
{subject:"Physics",q:"SI unit of magnetic flux",options:["Tesla","Weber","Henry","Volt"],answer:1},
{subject:"Physics",q:"Photoelectric effect supports",options:["Wave","Particle","Diffraction","Interference"],answer:1},
{subject:"Physics",q:"Acceleration in SHM proportional to",options:["Displacement","Velocity","Time","Mass"],answer:0},
{subject:"Physics",q:"Power factor for resistive circuit",options:["0","1","1/2","2"],answer:1},
{subject:"Physics",q:"Angular momentum conserved when torque",options:["maximum","zero","constant","infinite"],answer:1},
{subject:"Physics",q:"Energy of photon proportional to",options:["Frequency","Mass","Amplitude","Radius"],answer:0},
{subject:"Physics",q:"Current measured by",options:["Voltmeter","Ammeter","Barometer","Calorimeter"],answer:1},
{subject:"Physics",q:"Hooke law related to",options:["Elasticity","Optics","Gravity","Electricity"],answer:0},
{subject:"Physics",q:"Unit of electric charge",options:["Coulomb","Tesla","Joule","Pascal"],answer:0},
{subject:"Physics",q:"Lens formula uses",options:["u,v,f","m,c,t","F,a,m","P,V,T"],answer:0},
{subject:"Physics",q:"Speed of light",options:["3×10^8","3×10^6","10^5","9.8"],answer:0},

// CHEMISTRY (15)

{subject:"Chemistry",q:"Most electronegative element",options:["O","F","Cl","N"],answer:1},
{subject:"Chemistry",q:"Hybridization in methane",options:["sp","sp2","sp3","dsp2"],answer:2},
{subject:"Chemistry",q:"Order of reaction can be",options:["Zero","Fractional","Negative","All"],answer:3},
{subject:"Chemistry",q:"Shape of NH3",options:["Linear","Trigonal pyramidal","Planar","Tetrahedral"],answer:1},
{subject:"Chemistry",q:"Ideal gas equation",options:["PV=nRT","F=ma","E=mc²","V=IR"],answer:0},
{subject:"Chemistry",q:"Benzene has π electrons",options:["4","6","8","10"],answer:1},
{subject:"Chemistry",q:"pH of neutral water",options:["5","6","7","8"],answer:2},
{subject:"Chemistry",q:"Strong acid",options:["HCl","CH3COOH","NH4OH","H2O"],answer:0},
{subject:"Chemistry",q:"Atomic number carbon",options:["4","6","8","12"],answer:1},
{subject:"Chemistry",q:"Catalyst lowers",options:["Pressure","Activation energy","Mass","Volume"],answer:1},
{subject:"Chemistry",q:"Oxidation means",options:["Gain electron","Loss electron","Gain neutron","Loss proton"],answer:1},
{subject:"Chemistry",q:"Avogadro number",options:["6.022e23","3.14","1e6","9.8"],answer:0},
{subject:"Chemistry",q:"Diamond is allotrope of",options:["Si","Carbon","Sulfur","Iron"],answer:1},
{subject:"Chemistry",q:"Electron discovered by",options:["Bohr","Thomson","Newton","Dalton"],answer:1},
{subject:"Chemistry",q:"Strong reducing alkali metal",options:["Li","Na","K","Cs"],answer:0},

// MATHEMATICS (15)

{subject:"Math",q:"Derivative of sinx",options:["cosx","tanx","secx","-cosx"],answer:0},
{subject:"Math",q:"Derivative of e^x",options:["e^x","x","lnx","1/x"],answer:0},
{subject:"Math",q:"Integral of 1/x",options:["lnx+C","x²","e^x","1/x²"],answer:0},
{subject:"Math",q:"lim sinx/x",options:["0","1","2","∞"],answer:1},
{subject:"Math",q:"tan45",options:["0","1","2","∞"],answer:1},
{subject:"Math",q:"sin30",options:["1","1/2","0","√3"],answer:1},
{subject:"Math",q:"Slope in y=mx+b",options:["m","x","b","1"],answer:0},
{subject:"Math",q:"Determinant identity matrix",options:["0","1","2","n"],answer:1},
{subject:"Math",q:"Derivative of x³",options:["x²","2x","3x²","3x"],answer:2},
{subject:"Math",q:"Integral cosx",options:["sinx","tanx","-sinx","secx"],answer:0},
{subject:"Math",q:"log10(100)",options:["1","2","10","100"],answer:1},
{subject:"Math",q:"Probability lies between",options:["0 and1","1 and2","-1 and1","any"],answer:0},
{subject:"Math",q:"Matrix det zero means",options:["Identity","Singular","Unit","Orthogonal"],answer:1},
{subject:"Math",q:"Roots of x²−1=0",options:["1","-1","±1","0"],answer:2},
{subject:"Math",q:"Derivative ln x",options:["x","1/x","e^x","lnx"],answer:1},

// BIOLOGY (15)

{subject:"Biology",q:"Powerhouse of cell",options:["Nucleus","Mitochondria","Golgi","Ribosome"],answer:1},
{subject:"Biology",q:"Protein synthesis occurs at",options:["Nucleus","Ribosome","Golgi","Lysosome"],answer:1},
{subject:"Biology",q:"Universal donor",options:["A","B","AB","O"],answer:3},
{subject:"Biology",q:"Genetic material",options:["DNA","Protein","Lipid","Water"],answer:0},
{subject:"Biology",q:"Mendel worked on",options:["Pea","Rice","Wheat","Maize"],answer:0},
{subject:"Biology",q:"Father of evolution",options:["Darwin","Mendel","Pasteur","Lamarck"],answer:0},
{subject:"Biology",q:"Photosynthesis releases",options:["CO2","O2","N2","H2"],answer:1},
{subject:"Biology",q:"Unit of heredity",options:["Cell","Gene","Tissue","Chromoplast"],answer:1},
{subject:"Biology",q:"Human heart chambers",options:["2","3","4","5"],answer:2},
{subject:"Biology",q:"Hardy Weinberg law",options:["Mutation","Equilibrium","Ecology","Anatomy"],answer:1},
{subject:"Biology",q:"Cell discovered by",options:["Hooke","Newton","Darwin","Watson"],answer:0},
{subject:"Biology",q:"ATP stores",options:["Energy","Protein","Genes","Oxygen"],answer:0},
{subject:"Biology",q:"Chlorophyll present in",options:["Nucleus","Chloroplast","Ribosome","Root"],answer:1},
{subject:"Biology",q:"DNA replication",options:["Conservative","Semi-conservative","Random","Dispersive only"],answer:1},
{subject:"Biology",q:"Blood pigment",options:["Hemoglobin","Starch","Insulin","Chlorophyll"],answer:0}

];
function addQ(s,q,a){
questions.push({
subject:s,
q:q,
options:["Option A","Option B","Option C","Option D"],
answer:a
});
}

for(let i=1;i<=15;i++){
addQ('Physics','Hard Physics Question '+i,i%4);
}
for(let i=1;i<=15;i++){
addQ('Chemistry','Hard Chemistry Question '+i,(i+1)%4);
}
for(let i=1;i<=15;i++){
addQ('Mathematics','Hard Math Question '+i,(i+2)%4);
}
for(let i=1;i<=15;i++){
addQ('Biology','Hard Biology Question '+i,(i+3)%4);
}

let current=0;
let responses=new Array(questions.length).fill(null);

function buildPalette(){
let html='';
for(let i=0;i<questions.length;i++){
html+=`<button class='qbtn' id='p${i}' onclick='jump(${i})'>${i+1}</button>`;
}
document.getElementById('palette').innerHTML=html;
}

function loadQuestion(){
let q=questions[current];
document.getElementById('subject').innerText=q.subject;
document.getElementById('question').innerText='Q'+(current+1)+'. '+q.q;
let html='';
q.options.forEach((op,i)=>{
let checked=responses[current]===i?'checked':'';
html+=`<label class='option'><input type='radio' name='opt' value='${i}' ${checked}> ${op}</label>`;
});
document.getElementById('options').innerHTML=html;
}

function saveAnswer(){
let sel=document.querySelector('input[name="opt"]:checked');
if(sel){
responses[current]=parseInt(sel.value);
document.getElementById('p'+current).classList.add('answered');
}
}

function nextQ(){
saveAnswer();
if(current<questions.length-1){current++;loadQuestion();}
}

function prevQ(){
saveAnswer();
if(current>0){current--;loadQuestion();}
}

function jump(n){
saveAnswer();
current=n;
loadQuestion();
}

function submitTest(){
saveAnswer();
let score=0;
let correct=0;
for(let i=0;i<questions.length;i++){
if(responses[i]===questions[i].answer){
score+=4;
correct++;
}else if(responses[i]!==null){
score-=1;
}
}

document.getElementById('testArea').style.display='none';
document.getElementById('result').style.display='block';
document.getElementById('result').innerHTML=`
<h1>Score Card</h1>
Score: ${score}/240<br>
Correct: ${correct}<br>
Attempted: ${responses.filter(x=>x!==null).length}<br>
Accuracy: ${Math.round(correct/60*100)}%
`;
}

let time=10800;
setInterval(function(){
let m=Math.floor(time/60);
let s=time%60;
document.getElementById('timer').innerText=m+':' +(s<10?'0':'')+s;
time--;
if(time<=0){submitTest();}
},1000);

buildPalette();
loadQuestion();
</script>
</body>
</html>
