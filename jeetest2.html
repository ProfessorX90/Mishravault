<head>
<meta charset="UTF-8">
<title>JEE Mock Test with Review</title>
<style>
body{
margin:0;
font-family:Arial;
background:#eef2ff;
}
header{
background:#142c7d;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
}
.container{
display:grid;
grid-template-columns:3fr 1fr;
gap:20px;
padding:20px;
}
.main,.side{
background:white;
padding:25px;

}
.option{
display:block;
margin:12px 0;
padding:12px;
background:#eef3ff;
border-radius:10px;
}
.palette{
display:grid;
grid-template-columns:repeat(5,1fr);

}
.qbtn{
padding:10px;
border:none;
border-radius:8px;
background:#dbe4ff;
cursor:pointer;
}
.answered{background:#8de38d;}

padding:12px 18px;
margin:8px;
border:none;
border-radius:10px;
background:#142c7d;
color:white;
cursor:pointer;
}
#result{display:none}

let current=0;
let responses=new Array(questions.length).fill(null);

function buildPalette(){
let html='';
for(let i=0;i<questions.length;i++){
html+=`<button class='qbtn' id='p${i}' onclick='jump(${i})'>${i+1}</button>`;
}
document.getElementById('palette').innerHTML=html;
}

function loadQuestion(){
let q=questions[current];

document.getElementById('subject').innerText=q.subject;
document.getElementById('question').innerText='Q'+(current+1)+'. '+q.q;

let html='';
q.options.forEach((op,i)=>{
let checked=responses[current]===i?'checked':'';
html+=`
<label class='option'>
<input type='radio' name='opt' value='${i}' ${checked}>
${op}
</label>`;
});

document.getElementById('options').innerHTML=html;
updateAttempted();
}

function updateAttempted(){
document.getElementById('attempted').innerText=
responses.filter(x=>x!==null).length;
}

function saveAnswer(){
let s=document.querySelector('input[name="opt"]:checked');
if(s){
if(
responses[current]==null &&
responses.filter(x=>x!==null).length>=75
){
alert('Maximum 75 attempts allowed');
return;
}
responses[current]=parseInt(s.value);
document.getElementById('p'+current).classList.add('answered');
}
updateAttempted();
}

function nextQ(){
saveAnswer();
if(current<questions.length-1){
current++;
loadQuestion();
}
}

function prevQ(){
saveAnswer();
if(current>0){
current--;
loadQuestion();
}
}

function jump(n){
saveAnswer();
current=n;
loadQuestion();
}

function submitTest(){

saveAnswer();

let score=0;
let correct=0;
let attempted=0;

for(let i=0;i<questions.length;i++){

if(responses[i]!==null){
attempted++;

if(responses[i]===questions[i].answer){
score+=4;
correct++;
}
else{
score-=1;
}

}
}

document.getElementById('testArea').style.display='none';

let review='';

for(let i=0;i<questions.length;i++){

let ua=responses[i];
let ca=questions[i].answer;
let color='';
let status='';

if(ua===null){
color='#f1f1f1';
status='⚪ Not Attempted';
}
else if(ua===ca){
color='#dcffdc';
status='✅ Correct';
}
else{
color='#ffdada';
status='❌ Wrong';
}

review+=`
<div style="background:${color};padding:20px;margin:20px 0;border-radius:15px;">
<h3>Q${i+1}. ${questions[i].q}</h3>
<p><b>Your Answer:</b> ${ua===null?'Not Attempted':questions[i].options[ua]}</p>
<p><b>Correct Answer:</b> ${questions[i].options[ca]}</p>
<p>${status}</p>
</div>
`;

}

document.getElementById('result').style.display='block';
document.getElementById('result').innerHTML=`
<h1>Score Card</h1>
<h2>Score: ${score}</h2>
<h3>Attempted: ${attempted}</h3>
<h3>Correct: ${correct}</h3>
<h3>Accuracy: ${attempted?Math.round(correct/attempted*100):0}%</h3>
<hr>
<h2>Detailed Review</h2>
${review}
`;

window.scrollTo(0,0);
}

let time=10800;
setInterval(function(){
let m=Math.floor(time/60);
let s=time%60;
document.getElementById('timer').innerText=
m+':' +(s<10?'0':'')+s;
time--;
if(time<=0) submitTest();
},1000);

buildPalette();
loadQuestion();

</script>
