<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="responsive.css">
<title>IAT Mock Test 1</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef4ff;
}

header{
background:#0d47a1;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
}

.container{
display:grid;
grid-template-columns:3fr 1fr;
gap:20px;
padding:20px;
}

.main,.side{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.option{
display:block;
margin:12px 0;
padding:14px;
background:#eef3ff;
border-radius:12px;
}

button{
padding:12px 18px;
margin:8px;
border:none;
border-radius:10px;
background:#1565c0;
color:white;
cursor:pointer;
}

.palette{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

.qbtn{
padding:10px;
border:none;
border-radius:8px;
background:#d6e4ff;
}

.answered{
background:#8be28b;
}

#result{
display:none;
}
</style>
</head>
<body>


<header>
<h2>IAT MOCK TEST</h2>
<h2 id="timer">180:00</h2>
</header>


<div class="container">

<div class="main">

<div id="testArea">

<h3 id="subject"></h3>
<h2 id="question"></h2>

<div id="options"></div>

<button onclick="prevQ()">Previous</button>
<button onclick="nextQ()">Save & Next</button>
<button onclick="submitTest()">Submit</button>

<br><br>

<b>
Attempted:
<span id="attempted">0</span>/60
</b>

</div>

<div id="result"></div>

</div>


<div class="side">
<h3>Question Palette</h3>
<div class="palette" id="palette"></div>
</div>

</div>



<script>

const questions=[

// -------- PHYSICS (15) --------

{subject:"Physics",q:"A particle moves x=t³−6t²+9t. Velocity at t=2 s?",options:["-3","-1","0","1"],answer:1},
{subject:"Physics",q:"A 5kg block accelerated at 4m/s². Force?",options:["10","15","20","25"],answer:2},
{subject:"Physics",q:"A capacitor 2μF with 10V stores energy?",options:["100μJ","50μJ","200μJ","20μJ"],answer:0},
{subject:"Physics",q:"A projectile launched at 20m/s,45°. Range(g=10)",options:["20","30","40","50"],answer:2},
{subject:"Physics",q:"If R1=6Ω,R2=3Ω parallel Req=",options:["1","2","3","4"],answer:1},

{subject:"Physics",q:"Wave λ=4m,f=5Hz speed?",options:["10","15","20","25"],answer:2},
{subject:"Physics",q:"Moment of inertia rod about center ML²/",options:["3","12","6","2"],answer:1},
{subject:"Physics",q:"Photon λ=500nm energy closest(eV)",options:["1.5","2.5","3.5","4.5"],answer:1},
{subject:"Physics",q:"A ball dropped from 80m time(g=10)",options:["2","4","6","8"],answer:1},
{subject:"Physics",q:"Current if 24V across 8Ω",options:["2","3","4","5"],answer:1},

{subject:"Physics",q:"Escape velocity ratio Moon/Earth approx",options:["1/6","1/3","1/2","2/3"],answer:1},
{subject:"Physics",q:"Angular momentum unit",options:["kgm²/s","Ns","J","kg/s"],answer:0},
{subject:"Physics",q:"Lens f=50cm power?",options:["1D","2D","5D","0.5D"],answer:1},
{subject:"Physics",q:"KE doubles when speed multiplied by",options:["√2","2","4","1/2"],answer:0},
{subject:"Physics",q:"Simple pendulum l=1m period",options:["2","2π","π","1"],answer:0},


// -------- CHEMISTRY (15) --------

{subject:"Chemistry",q:"2 moles O₂ molecules count?",options:["6.022e23","12.044e23","3e23","2e23"],answer:1},
{subject:"Chemistry",q:"Molarity of 0.5 mol in 250mL",options:["1","2","0.5","4"],answer:1},
{subject:"Chemistry",q:"pH when [H+]=10^-3",options:["2","3","4","5"],answer:1},
{subject:"Chemistry",q:"Empirical formula CH₂O molar 180 molecular?",options:["C6H12O6","C3H6O3","C2H4O2","CHO"],answer:0},
{subject:"Chemistry",q:"Oxidation no Mn in KMnO4",options:["5","6","7","4"],answer:2},

{subject:"Chemistry",q:"For first order t1/2 proportional",options:["conc","1/conc","constant","temp²"],answer:2},
{subject:"Chemistry",q:"PV=nRT n=2,T=300,P=1,R=.082 V?",options:["24.6","49.2","12.3","22.4"],answer:1},
{subject:"Chemistry",q:"Molality 1 mole in 500g solvent",options:["1","2","0.5","4"],answer:1},
{subject:"Chemistry",q:"Equivalent wt H2SO4",options:["49","98","24.5","196"],answer:0},
{subject:"Chemistry",q:"Bond order O2",options:["1","2","2.5","3"],answer:1},

{subject:"Chemistry",q:"Strongest acid",options:["HF","HCl","HI","HBr"],answer:2},
{subject:"Chemistry",q:"Hybridization in C2H2",options:["sp","sp2","sp3","dsp"],answer:0},
{subject:"Chemistry",q:"1 Faraday charge=",options:["96500C","965C","96C","965000"],answer:0},
{subject:"Chemistry",q:"Rate doubles every 10°C rule",options:["Arrhenius","Le Chatelier","Raoult","Boyle"],answer:0},
{subject:"Chemistry",q:"Benzene π electrons",options:["4","6","8","10"],answer:1},


// -------- MATHEMATICS (15) --------

{subject:"Math",q:"d/dx(x³+2x)=?",options:["3x²+2","x²+2","3x+2","x³"],answer:0},
{subject:"Math",q:"∫0→2 x dx",options:["1","2","3","4"],answer:1},
{subject:"Math",q:"det[[1,2],[3,4]]",options:["-2","2","-1","1"],answer:0},
{subject:"Math",q:"If sinx=3/5 cosx=",options:["4/5","5/4","3/4","2/5"],answer:0},
{subject:"Math",q:"Permutation 5P2",options:["10","20","25","5"],answer:1},

{subject:"Math",q:"Combination 5C2",options:["5","10","20","25"],answer:1},
{subject:"Math",q:"lim(1+1/n)^n",options:["1","e","∞","0"],answer:1},
{subject:"Math",q:"Solve x²−5x+6=0 roots sum",options:["5","6","3","2"],answer:0},
{subject:"Math",q:"Matrix inverse exists when det",options:["0","≠0","1 only","-1"],answer:1},
{subject:"Math",q:"∫e^x dx",options:["e^x","xe^x","lnx","x"],answer:0},

{subject:"Math",q:"Probability two heads in two tosses",options:["1/2","1/4","3/4","1"],answer:1},
{subject:"Math",q:"Derivative ln x",options:["1/x","x","lnx","e^x"],answer:0},
{subject:"Math",q:"tan45+tan45",options:["1","2","0","√2"],answer:1},
{subject:"Math",q:"Eigenvalues of identity matrix",options:["0","1","2","n"],answer:1},
{subject:"Math",q:"Area under y=x from0→1",options:["1","1/2","2","1/3"],answer:1},


// -------- BIOLOGY (15) --------

{subject:"Biology",q:"DNA bp if 20%A then %G",options:["20","30","40","60"],answer:1},
{subject:"Biology",q:"Human chromosome number",options:["44","46","48","23"],answer:1},
{subject:"Biology",q:"ATP high energy phosphate bonds",options:["1","2","3","4"],answer:1},
{subject:"Biology",q:"Hardy Weinberg p=.7 q=?",options:["0.2","0.3","0.4","0.5"],answer:1},
{subject:"Biology",q:"Mendel monohybrid ratio",options:["3:1","9:3:3:1","1:2:1","2:1"],answer:0},

{subject:"Biology",q:"Photosynthesis Calvin cycle in",options:["stroma","grana","ribosome","cytosol"],answer:0},
{subject:"Biology",q:"Human heart pumps chambers",options:["2","3","4","5"],answer:2},
{subject:"Biology",q:"Ribosome in prokaryote",options:["60S","70S","80S","90S"],answer:1},
{subject:"Biology",q:"Universal donor",options:["A","B","AB","O"],answer:3},
{subject:"Biology",q:"Replication enzyme",options:["amylase","polymerase","ligase only","pepsin"],answer:1},

{subject:"Biology",q:"Codons for amino acids",options:["61","64","20","3"],answer:0},
{subject:"Biology",q:"Net ATP glycolysis",options:["1","2","4","8"],answer:1},
{subject:"Biology",q:"Water potential unit",options:["Pa","J","mol","kg"],answer:0},
{subject:"Biology",q:"Respiratory quotient carbs",options:["0.7","0.8","1","2"],answer:2},
{subject:"Biology",q:"Population if p=.6 genotype AA freq",options:["0.16","0.36","0.48","0.6"],answer:1}

];


let current=0;
let responses=
new Array(questions.length).fill(null);


function buildPalette(){

let html="";

for(let i=0;i<questions.length;i++){

html+=`
<button
class='qbtn'
id='p${i}'
onclick='jump(${i})'
>
${i+1}
</button>
`;

}

document.getElementById(
"palette"
).innerHTML=html;

}


function loadQuestion(){

let q=questions[current];

document.getElementById(
"subject"
).innerText=q.subject;

document.getElementById(
"question"
).innerText=
"Q"+(current+1)+". "+q.q;


let html="";

q.options.forEach((op,i)=>{

let checked=
responses[current]===i
?
"checked":"";

html+=`
<label class='option'>
<input
type='radio'
name='opt'
value='${i}'
${checked}
>
${op}
</label>
`;

});

document.getElementById(
"options"
).innerHTML=html;

updateAttempted();

}



function updateAttempted(){

document.getElementById(
"attempted"
).innerText=
responses.filter(
x=>x!==null
).length;

}



function saveAnswer(){

let s=document.querySelector(
'input[name="opt"]:checked'
);

if(s){

responses[current]=
parseInt(s.value);

document.getElementById(
"p"+current
).classList.add(
"answered"
);

}

updateAttempted();

}


function nextQ(){
saveAnswer();
if(current<questions.length-1){
current++;
loadQuestion();
}
}

function prevQ(){
saveAnswer();
if(current>0){
current--;
loadQuestion();
}
}

function jump(n){
saveAnswer();
current=n;
loadQuestion();
}



function submitTest(){

saveAnswer();

let score=0;
let correct=0;
let attempted=0;

for(let i=0;i<questions.length;i++){

if(responses[i]!==null){

attempted++;

if(
responses[i]===
questions[i].answer
){
score+=4;
correct++;
}
else{
score-=1;
}

}

}

document.getElementById(
"testArea"
).style.display="none";


let review="";

for(let i=0;i<questions.length;i++){

let ua=responses[i];
let ca=questions[i].answer;

let color="";
let status="";

if(ua===null){
color="#eee";
status="⚪ Not Attempted";
}

else if(ua===ca){
color="#dcffdc";
status="✅ Correct";
}

else{
color="#ffd9d9";
status="❌ Wrong";
}


review+=`

<div style="
background:${color};
padding:20px;
margin:20px 0;
border-radius:15px;
">

<h3>
Q${i+1}
${questions[i].q}
</h3>

<p>
Your Answer:
<b>
${
ua===null
?
"Not Attempted"
:
questions[i].options[ua]
}
</b>
</p>

<p>
Correct:
<b>
${questions[i].options[ca]}
</b>
</p>

<p>${status}</p>

</div>

`;

}


document.getElementById(
"result"
).style.display="block";


document.getElementById(
"result"
).innerHTML=`

<h1>IAT SCORECARD</h1>

<h2>Score: ${score}</h2>

<h3>Attempted:
${attempted}</h3>

<h3>Correct:
${correct}</h3>

<h3>Accuracy:
${attempted?
Math.round(correct/attempted*100):0}%
</h3>

<hr>

<h2>Detailed Analysis</h2>

${review}

`;

window.scrollTo(0,0);

}




let time=10800;

setInterval(function(){

let m=
Math.floor(time/60);

let s=
time%60;

document.getElementById(
"timer"
).innerText=
m+":"+(s<10?"0":"")+s;

time--;

if(time<=0){
submitTest();
}

},1000);



buildPalette();
loadQuestion();

</script>

</body>
</html>
