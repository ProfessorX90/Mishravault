


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IAT Test 2 Hard Mock</title>
<style>
body{margin:0;font-family:Arial;background:#eef2ff}
header{background:#142c7d;color:#fff;padding:15px 30px;display:flex;justify-content:space-between}
.container{display:grid;grid-template-columns:3fr 1fr;gap:20px;padding:25px}
.main,.side{background:#fff;padding:25px;border-radius:18px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.option{display:block;padding:12px;margin:12px 0;background:#f1f5ff;border-radius:10px}
.palette{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.qbtn{padding:10px;border:none;background:#dbe4ff;border-radius:8px;cursor:pointer}
.answered{background:#79d879}
.action{padding:12px 20px;margin:8px;border:none;background:#142c7d;color:#fff;border-radius:10px;cursor:pointer}
#result{display:none;font-size:22px;line-height:2}
</style>
</head>
<body>
<header>
<h2>IAT TEST 2 (60 Questions)</h2>
<h2 id="timer">180:00</h2>
</header>

<div class="container">
<div class="main">
<div id="testArea">
<h3 id="subject"></h3>
<h2 id="question"></h2>
<div id="options"></div>
<button class="action" onclick="prevQ()">Previous</button>
<button class="action" onclick="nextQ()">Save & Next</button>
<button class="action" onclick="submitTest()">Submit</button>
</div>
<div id="result"></div>
</div>

<div class="side">
<h3>Question Palette</h3>
<div class="palette" id="palette"></div>
</div>
</div>

<script>
const questions=[

// -------- PHYSICS (15) --------

{subject:"Physics",q:"A body moving at 10 m/s doubles speed. Kinetic energy becomes how many times?",options:["2","4","6","8"],answer:1},
{subject:"Physics",q:"If F=20N and m=4kg, acceleration is",options:["4","5","6","8"],answer:1},
{subject:"Physics",q:"Projectile max range occurs at",options:["30","45","60","90"],answer:1},
{subject:"Physics",q:"Numerical: 2Ω and 3Ω in series total resistance",options:["5","6","1","0.5"],answer:0},
{subject:"Physics",q:"Escape velocity proportional to",options:["√M/R","M²","R²","1/R²"],answer:0},

{subject:"Physics",q:"Photon energy E=hf. If f doubles E becomes",options:["same","double","half","quadruple"],answer:1},
{subject:"Physics",q:"A 10V battery across 5Ω current=?",options:["1A","2A","3A","5A"],answer:1},
{subject:"Physics",q:"Unit of power",options:["J","W","N","Pa"],answer:1},
{subject:"Physics",q:"Numerical: momentum of 2kg moving 3m/s",options:["5","6","7","8"],answer:1},
{subject:"Physics",q:"SHM acceleration proportional to",options:["x","1/x","x²","constant"],answer:0},

{subject:"Physics",q:"Lens power of 2m focal length",options:["0.5D","2D","4D","1D"],answer:0},
{subject:"Physics",q:"Frequency unit",options:["Hz","Wb","T","J"],answer:0},
{subject:"Physics",q:"Work done in circular motion",options:["0","1","2","4"],answer:0},
{subject:"Physics",q:"Numerical: 12C charge in 3s current",options:["2","3","4","5"],answer:2},
{subject:"Physics",q:"Dimension of force",options:["MLT^-2","ML²T","LT","M²L"],answer:0},


// -------- CHEMISTRY (15) --------

{subject:"Chemistry",q:"Molar mass of H2O",options:["16","18","20","22"],answer:1},
{subject:"Chemistry",q:"pH of strong acid likely",options:["2","7","10","14"],answer:0},
{subject:"Chemistry",q:"Numerical: 1 mole has particles",options:["6.022e23","3e8","1e6","100"],answer:0},
{subject:"Chemistry",q:"Oxidation means",options:["gain e","loss e","gain p","none"],answer:1},
{subject:"Chemistry",q:"Hybridization methane",options:["sp","sp2","sp3","dsp2"],answer:2},

{subject:"Chemistry",q:"Most electronegative",options:["O","F","N","Cl"],answer:1},
{subject:"Chemistry",q:"Ideal gas equation",options:["PV=nRT","F=ma","V=IR","E=mc²"],answer:0},
{subject:"Chemistry",q:"Atomic no carbon",options:["4","6","8","12"],answer:1},
{subject:"Chemistry",q:"Numerical: pH if [H+]=10^-7",options:["5","6","7","8"],answer:2},
{subject:"Chemistry",q:"Catalyst lowers",options:["mass","Ea","volume","moles"],answer:1},

{subject:"Chemistry",q:"Benzene pi electrons",options:["4","6","8","10"],answer:1},
{subject:"Chemistry",q:"Strong acid",options:["HCl","NH4OH","CH3COOH","H2O"],answer:0},
{subject:"Chemistry",q:"Diamond allotrope of",options:["Si","C","Fe","S"],answer:1},
{subject:"Chemistry",q:"Numerical: Na valency",options:["1","2","3","4"],answer:0},
{subject:"Chemistry",q:"Electron discovered by",options:["Bohr","Thomson","Dalton","Einstein"],answer:1},


// -------- MATH (15) --------

{subject:"Math",q:"Derivative of x²",options:["x","2x","x²","2"],answer:1},
{subject:"Math",q:"∫x dx",options:["x²","x²/2","2x","lnx"],answer:1},
{subject:"Math",q:"sin30",options:["0","1/2","1","√3"],answer:1},
{subject:"Math",q:"Numerical: 12²=?",options:["124","144","154","164"],answer:1},
{subject:"Math",q:"lim sinx/x",options:["0","1","2","∞"],answer:1},

{subject:"Math",q:"Derivative e^x",options:["e^x","x","1","lnx"],answer:0},
{subject:"Math",q:"tan45",options:["0","1","2","3"],answer:1},
{subject:"Math",q:"log10(1000)",options:["2","3","4","5"],answer:1},
{subject:"Math",q:"Numerical: probability of sure event",options:["0","1","2","1/2"],answer:1},
{subject:"Math",q:"Roots x²-4=0",options:["±2","±4","2 only","4 only"],answer:0},

{subject:"Math",q:"Det(identity)",options:["0","1","2","n"],answer:1},
{subject:"Math",q:"Derivative sinx",options:["cosx","tanx","secx","-cosx"],answer:0},
{subject:"Math",q:"Numerical: 7*8",options:["54","56","58","64"],answer:1},
{subject:"Math",q:"Slope in y=mx+b",options:["m","x","b","y"],answer:0},
{subject:"Math",q:"Integral cosx",options:["sinx","tanx","secx","-sinx"],answer:0},


// -------- BIOLOGY (15) --------

{subject:"Biology",q:"Powerhouse cell",options:["Nucleus","Mitochondria","Golgi","Ribo"],answer:1},
{subject:"Biology",q:"Protein synthesis site",options:["Nucleus","Ribosome","Cell wall","Root"],answer:1},
{subject:"Biology",q:"Human heart chambers",options:["2","3","4","5"],answer:2},
{subject:"Biology",q:"Numerical: Human chromosome pairs",options:["21","22","23","24"],answer:2},
{subject:"Biology",q:"Universal donor",options:["A","B","AB","O"],answer:3},

{subject:"Biology",q:"Genetic material",options:["DNA","Protein","Lipid","Water"],answer:0},
{subject:"Biology",q:"Mendel worked on",options:["Pea","Rice","Wheat","Maize"],answer:0},
{subject:"Biology",q:"Photosynthesis releases",options:["CO2","O2","N2","H2"],answer:1},
{subject:"Biology",q:"Numerical: ATP full form molecules count in name letters starts with",options:["3","2","1","4"],answer:0},
{subject:"Biology",q:"Father evolution",options:["Darwin","Pasteur","Mendel","Hooke"],answer:0},

{subject:"Biology",q:"Cell discovered by",options:["Hooke","Newton","Watson","Bohr"],answer:0},
{subject:"Biology",q:"Unit heredity",options:["Gene","Cell","Tissue","Leaf"],answer:0},
{subject:"Biology",q:"Numerical: Blood groups in ABO",options:["2","3","4","5"],answer:2},
{subject:"Biology",q:"DNA replication",options:["Conservative","Semi-conservative","Random","None"],answer:1},
{subject:"Biology",q:"Blood pigment",options:["Hemoglobin","Chlorophyll","Insulin","Starch"],answer:0}

];
function addQ(s,q,a){
questions.push({
subject:s,
q:q,
options:["Option A","Option B","Option C","Option D"],
answer:a
});
}

for(let i=1;i<=15;i++){
addQ('Physics','Hard Physics Question '+i,i%4);
}
for(let i=1;i<=15;i++){
addQ('Chemistry','Hard Chemistry Question '+i,(i+1)%4);
}
for(let i=1;i<=15;i++){
addQ('Mathematics','Hard Math Question '+i,(i+2)%4);
}
for(let i=1;i<=15;i++){
addQ('Biology','Hard Biology Question '+i,(i+3)%4);
}

let current=0;
let responses=new Array(questions.length).fill(null);

function buildPalette(){
let html='';
for(let i=0;i<questions.length;i++){
html+=`<button class='qbtn' id='p${i}' onclick='jump(${i})'>${i+1}</button>`;
}
document.getElementById('palette').innerHTML=html;
}

function loadQuestion(){
let q=questions[current];
document.getElementById('subject').innerText=q.subject;
document.getElementById('question').innerText='Q'+(current+1)+'. '+q.q;
let html='';
q.options.forEach((op,i)=>{
let checked=responses[current]===i?'checked':'';
html+=`<label class='option'><input type='radio' name='opt' value='${i}' ${checked}> ${op}</label>`;
});
document.getElementById('options').innerHTML=html;
}

function saveAnswer(){
let sel=document.querySelector('input[name="opt"]:checked');
if(sel){
responses[current]=parseInt(sel.value);
document.getElementById('p'+current).classList.add('answered');
}
}

function nextQ(){
saveAnswer();
if(current<questions.length-1){current++;loadQuestion();}
}

function prevQ(){
saveAnswer();
if(current>0){current--;loadQuestion();}
}

function jump(n){
saveAnswer();
current=n;
loadQuestion();
}

function submitTest(){
saveAnswer();
let score=0;
let correct=0;
for(let i=0;i<questions.length;i++){
if(responses[i]===questions[i].answer){
score+=4;
correct++;
}else if(responses[i]!==null){
score-=1;
}
}

document.getElementById('testArea').style.display='none';
document.getElementById('result').style.display='block';
document.getElementById('result').innerHTML=`
<h1>Score Card</h1>
Score: ${score}/240<br>
Correct: ${correct}<br>
Attempted: ${responses.filter(x=>x!==null).length}<br>
Accuracy: ${Math.round(correct/60*100)}%
`;
}

let time=10800;
setInterval(function(){
let m=Math.floor(time/60);
let s=time%60;
document.getElementById('timer').innerText=m+':' +(s<10?'0':'')+s;
time--;
if(time<=0){submitTest();}
},1000);

buildPalette();
loadQuestion();
</script>
</body>
</html>
