
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JEE Mock Test with Review</title>
<style>
body{
margin:0;
font-family:Arial;
background:#eef2ff;
}
header{
background:#142c7d;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
}
.container{
display:grid;
grid-template-columns:3fr 1fr;
gap:20px;
padding:20px;
}
.main,.side{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 4px 14px rgba(0,0,0,.08);
}
.option{
display:block;
margin:12px 0;
padding:12px;
background:#eef3ff;
border-radius:10px;
}
.palette{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}
.qbtn{
padding:10px;
border:none;
border-radius:8px;
background:#dbe4ff;
cursor:pointer;
}
.answered{background:#8de38d;}
button{
padding:12px 18px;
margin:8px;
border:none;
border-radius:10px;
background:#142c7d;
color:white;
cursor:pointer;
}
#result{display:none}
</style>
</head>

<button onclick="prevQ()">Previous</button>
<button onclick="nextQ()">Save & Next</button>
<button onclick="submitTest()">Submit</button>

<br><br>
<b>Attempted : <span id="attempted">0</span>/75</b>
</div>

<div id="result"></div>
</div>
